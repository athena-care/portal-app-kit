name: Publish npm (jsDelivr)

# Trusted Publishing (OIDC) — no NPM_TOKEN. Configure on npmjs.com first:
# Package → Settings → Trusted Publishers → GitHub Actions
#   org/user: athena-care
#   repo: portal-app-kit
#   workflow: publish-npm.yml

on:
  push:
    branches: [main]
    paths:
      - "assets/**"
      - "package.json"
      - "kit-urls.json"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Use npm with Trusted Publishing support
        run: npm install -g npm@latest

      - name: Publish to npm (OIDC)
        run: npm publish --access public
